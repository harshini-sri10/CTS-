<!DOCTYPE html>
<html>

<head>
    <title>Event Gallery</title>

    <style>
        .eventImage {
            width: 180px;
            height: 120px;
            border: 2px solid black;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>Community Event Gallery</h2>

    <table border="1">

        <tr>
            <td>
                <img src="event1.jpg" alt="Music Event" title="Music Event" class="eventImage">
                <p>Music Event</p>
            </td>

            <td>
                <img src="event2.jpg" alt="Sports Event" title="Sports Event" class="eventImage">
                <p>Sports Event</p>
            </td>

            <td>
                <img src="event3.jpg" alt="Food Festival" title="Food Festival" class="eventImage">
                <p>Food Festival</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Dance Show" title="Dance Show" class="eventImage">
                <p>Dance Show</p>
            </td>

            <td>
                <img src="event5.jpg" alt="Book Fair" title="Book Fair" class="eventImage">
                <p>Book Fair</p>
            </td>

            <td>
                <img src="event6.jpg" alt="Art Exhibition" title="Art Exhibition" class="eventImage">
                <p>Art Exhibition</p>
            </td>
        </tr>

    </table>

</body>

</html>
