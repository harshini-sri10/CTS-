<!DOCTYPE html>
<html>

<head>
    <title>Debug Example</title>
</head>

<body>

    <h2>Debugging Example</h2>

    <script>

        let eventName = "Music Fest";
        let participants = 150;

        console.log("Event Name:", eventName);
        console.log("Participants:", participants);

        debugger;

        participants += 50;

        console.log("Updated Participants:",
            participants);

    </script>

</body>

</html>
