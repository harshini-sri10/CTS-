<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Display and Visibility</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="d-none d-md-block bg-primary text-white p-3">
            Visible on Medium Screens and Above
        </div>

        <div class="d-none d-lg-flex bg-success text-white p-3 mt-3">
            Visible on Large Screens and Above
        </div>

        <hr>

        <div class="d-none d-md-block bg-dark text-white p-4">
            Responsive Sidebar
        </div>

    </div>

</body>

</html>
