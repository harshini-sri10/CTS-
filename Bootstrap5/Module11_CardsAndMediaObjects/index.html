<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cards and Media Objects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Profile Card</h2>

        <div class="card" style="width:300px;">
            <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Profile">

            <div class="card-body">
                <h5 class="card-title">John Doe</h5>
                <p class="card-text">
                    Web Developer
                </p>

                <a href="#" class="btn btn-primary">
                    View Profile
                </a>
            </div>
        </div>

        <hr>

        <h2>Media Object Layout</h2>

        <div class="d-flex align-items-start">

            <img src="https://via.placeholder.com/100" class="me-3 rounded" alt="Image">

            <div>
                <h5>Article Title</h5>
                <p>
                    This content appears beside the image.
                </p>
            </div>

        </div>

    </div>

</body>

</html>
