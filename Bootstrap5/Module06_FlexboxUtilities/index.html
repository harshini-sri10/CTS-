<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flexbox Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Responsive Navbar using Flexbox</h2>

        <div class="d-flex flex-column flex-md-row bg-light p-3 border">
            <div class="p-2 fw-bold">Logo</div>
            <div class="p-2">Home</div>
            <div class="p-2">About</div>
            <div class="p-2">Contact</div>
        </div>

        <hr>

        <h2>Card Layout</h2>

        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center">
                <h5>Product</h5>
                <button class="btn btn-primary">Buy</button>
            </div>
        </div>

    </div>

</body>

</html>
