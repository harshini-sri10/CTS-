<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spacing Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="bg-primary text-white m-3 p-2">
            Margin 3 & Padding 2
        </div>

        <div class="bg-success text-white mt-4 py-5 text-center">
            Margin Top 4 & Padding Y 5
        </div>

        <hr>

        <h2 class="text-center my-5">
            Pricing Section
        </h2>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h3>Basic</h3>
                    <p>$10/month</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h3>Pro</h3>
                    <p>$20/month</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h3>Premium</h3>
                    <p>$30/month</p>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
