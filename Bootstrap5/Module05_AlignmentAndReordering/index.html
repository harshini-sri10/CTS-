<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Alignment and Reordering</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Centered Content</h2>

        <div class="row justify-content-center align-items-center border" style="height:200px;">

            <div class="col-4 bg-primary text-white text-center p-3">
                Centered Box
            </div>

        </div>

        <hr>

        <h2>Column Reordering</h2>

        <div class="row">

            <div class="col-md-6 order-md-2 bg-success text-white p-3">
                Second on Desktop
            </div>

            <div class="col-md-6 order-md-1 bg-danger text-white p-3">
                First on Desktop
            </div>

        </div>

    </div>

</body>

</html>
