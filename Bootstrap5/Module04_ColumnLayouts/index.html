<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Column Layouts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h2>Sidebar Layout</h2>

        <div class="row">
            <div class="col-md-3 bg-dark text-white p-3">
                Sidebar
            </div>

            <div class="col-md-9 bg-light p-3">
                Main Content
            </div>
        </div>

        <hr>

        <h2>Four Column Layout</h2>

        <div class="row text-center">

            <div class="col-sm-3 bg-primary text-white p-3">1</div>
            <div class="col-sm-3 bg-success text-white p-3">2</div>
            <div class="col-sm-3 bg-warning p-3">3</div>
            <div class="col-sm-3 bg-danger text-white p-3">4</div>

        </div>

    </div>

</body>

</html>
