<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bootstrap JS Plugins</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Bootstrap Modal</h2>

        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demoModal">
            Open Modal
        </button>

        <div class="modal fade" id="demoModal">

            <div class="modal-dialog">

                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Bootstrap Modal</h5>

                        <button class="btn-close" data-bs-dismiss="modal">
                        </button>
                    </div>

                    <div class="modal-body">
                        This is a Bootstrap Modal Example.
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>

                </div>

            </div>

        </div>

        <hr class="my-5">

        <h2>Bootstrap Accordion</h2>

        <div class="accordion" id="accordionExample">

            <div class="accordion-item">

                <h2 class="accordion-header">
                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#item1">
                        Question 1
                    </button>
                </h2>

                <div id="item1" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">

                    <div class="accordion-body">
                        Answer for Question 1.
                    </div>

                </div>

            </div>

            <div class="accordion-item">

                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#item2">
                        Question 2
                    </button>
                </h2>

                <div id="item2" class="accordion-collapse collapse" data-bs-parent="#accordionExample">

                    <div class="accordion-body">
                        Answer for Question 2.
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
