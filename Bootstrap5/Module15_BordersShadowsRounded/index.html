<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Borders and Shadows</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Rounded Circle Image</h2>

        <img src="https://via.placeholder.com/200" class="border border-primary border-3 rounded-circle" alt="Image">

        <div class="card shadow-lg rounded-pill p-4 text-center">
            <h4>Bootstrap Shadow Card</h4>
            <p>
                Shadow and rounded pill example.
            </p>
        </div>

    </div>

</body>

</html>
