<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Positioning Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            padding-bottom: 80px;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <h2>Image with Badge Overlay</h2>

        <div class="position-relative d-inline-block">

            <img src="https://via.placeholder.com/250" class="img-fluid rounded" alt="Product">

            <span class="position-absolute top-0 start-100 translate-middle badge bg-danger">
                New
            </span>

        </div>

    </div>

    <footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center p-3">
        Fixed Footer
    </footer>

</body>

</html>
