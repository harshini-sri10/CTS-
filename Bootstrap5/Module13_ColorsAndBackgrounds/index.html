<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Colors and Backgrounds</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Dashboard Cards</h2>

        <div class="row g-3">

            <div class="col-md-3">
                <div class="bg-primary text-white p-4 rounded">
                    Sales
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-success text-white p-4 rounded">
                    Users
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-warning p-4 rounded">
                    Revenue
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-danger text-white p-4 rounded">
                    Orders
                </div>
            </div>

        </div>

        <hr>

        <div class="bg-dark bg-gradient text-white p-5 text-center rounded">
            Gradient Background Example
        </div>

    </div>

</body>

</html>
